# deploy/nginx-telebots.conf
# Nginx config snippet for telebots.
#
# OPTION A — standalone domain (e.g. bots.yourdomain.com)
#   Copy this whole file to /etc/nginx/sites-available/telebots
#   Update server_name and SSL cert paths
#   ln -s /etc/nginx/sites-available/telebots /etc/nginx/sites-enabled/
#
# OPTION B — sub-path on existing domain (e.g. yourdomain.com/telebots/...)
#   Paste only the location blocks into your existing server block.
#
# Telegram requires HTTPS for webhooks.

# ── Upstreams ─────────────────────────────────────────────────────────
upstream telebots_anglers {
    server 127.0.0.1:5010;
}

# upstream telebots_nextbot {
#     server 127.0.0.1:5011;
# }

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────
server {
    listen 80;
    server_name bots.yourdomain.com;
    return 301 https://$server_name$request_uri;
}

# ── HTTPS main block ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name bots.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/bots.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bots.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # ── Alberta Anglers bot ──────────────────────────────────────────
    # Web face
    location /anglers/ {
        proxy_pass         http://telebots_anglers/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Telegram webhook — Telegram POSTs here
    location /anglers/webhook {
        proxy_pass         http://telebots_anglers/webhook;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Health check
    location /anglers/health {
        proxy_pass http://telebots_anglers/health;
    }

    # ── Add more bots here ───────────────────────────────────────────
    # location /nextbot/ { proxy_pass http://telebots_nextbot/; ... }
    # location /nextbot/webhook { proxy_pass http://telebots_nextbot/webhook; ... }
}
